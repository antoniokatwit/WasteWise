<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09130d">
  <title>WasteWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,800;1,9..144,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     START SCREEN
     ══════════════════════════════════════════════════════════ -->
<div id="screen-start" class="screen active">
  <div class="logo">Waste<span class="logo-accent">Wise</span></div>
  <p class="tagline">Tap the item. Watch it split. Sort the pieces.</p>

  <div class="bin-legend">
    <div class="legend-item recycle"><div class="legend-dot"></div>Recycle</div>
    <div class="legend-item trash"  ><div class="legend-dot"></div>Trash</div>
    <div class="legend-item compost"><div class="legend-dot"></div>Compost</div>
  </div>

  <button class="start-btn" id="startBtn" onclick="startGame()" disabled>Loading...</button>
  <p class="start-note">10 items &nbsp;&middot;&nbsp; tap to split &nbsp;&middot;&nbsp; sort each piece</p>
  <p class="loading-msg" id="loadingMsg"></p>
</div>

<!-- ══════════════════════════════════════════════════════════
     GAME SCREEN
     ══════════════════════════════════════════════════════════ -->
<div id="screen-game" class="screen">

  <div class="topbar">
    <div class="topbar-logo">Waste<span class="logo-accent">Wise</span></div>
    <div class="topbar-right">
      <span class="topbar-progress-label" id="progressLabel">1 / 10</span>
      <div class="topbar-score">Score&nbsp;<span id="scoreNum">0</span></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width: 10%"></div>
  </div>

  <div class="game-body" id="gameBody">

    <div class="item-card" id="itemCard">
      <div class="item-monogram" id="itemMonogram"></div>
      <div class="item-name"     id="itemName"></div>
      <div class="item-desc"     id="itemDesc"></div>
      <div class="tap-hint hidden" id="tapHint">Tap to take apart</div>
    </div>

    <div class="components-zone hidden" id="componentsZone">
      <div class="zone-label" id="zoneLabel">Sort each piece</div>
      <div id="componentsList"></div>
    </div>

    <div class="feedback-banner" id="feedbackBanner"></div>
    <button class="next-btn" id="nextBtn" onclick="nextItem()"></button>

  </div>

  <div class="bins-area">
    <div class="bins-hint" id="binsHint">Select a piece above, then tap a bin</div>
    <div class="bins-row">
      <button class="bin-btn recycle" onclick="sortSelected('recycle')">
        <div class="bin-icon"></div>
        <span class="bin-label">Recycle</span>
      </button>
      <button class="bin-btn trash" onclick="sortSelected('trash')">
        <div class="bin-icon"></div>
        <span class="bin-label">Trash</span>
      </button>
      <button class="bin-btn compost" onclick="sortSelected('compost')">
        <div class="bin-icon"></div>
        <span class="bin-label">Compost</span>
      </button>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════════
     RESULTS SCREEN
     ══════════════════════════════════════════════════════════ -->
<div id="screen-results" class="screen">
  <div class="results-grade"  id="resultsGrade"></div>
  <div class="results-title"  id="resultsTitle"></div>
  <div class="results-score"  id="resultsScore"></div>
  <div class="results-of"     id="resultsOf"></div>

  <div class="results-breakdown">
    <div class="breakdown-title">Breakdown by bin</div>
    <div class="breakdown-row">
      <span class="breakdown-label"><span class="breakdown-dot recycle"></span>Recycle</span>
      <span class="breakdown-value" id="brRecycle">—</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label"><span class="breakdown-dot trash"></span>Trash</span>
      <span class="breakdown-value" id="brTrash">—</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label"><span class="breakdown-dot compost"></span>Compost</span>
      <span class="breakdown-value" id="brCompost">—</span>
    </div>
  </div>

  <button class="play-again-btn" onclick="startGame()">Play Again</button>
</div>

<script>
"use strict";

/* ── State ───────────────────────────────────────────────────── */
let allItems       = [];
let gameItems      = [];
let currentIdx     = 0;
let selectedCompId = null;
let sortedMap      = {};
let score          = 0;
let totalParts     = 0;
let correctParts   = 0;
let catStats       = newStats();
let splitting      = false;

function newStats() {
  return { recycle:{c:0,t:0}, trash:{c:0,t:0}, compost:{c:0,t:0} };
}
function $(id) { return document.getElementById(id); }

/* ── Data fetch ──────────────────────────────────────────────── */
(async function bootstrap() {
  const msg = $("loadingMsg");
  const btn = $("startBtn");
  try {
    const res = await fetch("/api/items");
    if (!res.ok) throw new Error("HTTP " + res.status);
    allItems        = await res.json();
    btn.textContent = "Let's Sort";
    btn.disabled    = false;
    msg.textContent = "";
  } catch (err) {
    msg.textContent = "Could not load items — is the server running?";
    console.error(err);
  }
})();

/* ── Helpers ─────────────────────────────────────────────────── */
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $("screen-" + id).classList.add("active");
  window.scrollTo(0, 0);
}

function setBinsActive(on) {
  document.querySelectorAll(".bin-btn").forEach(b => b.classList.toggle("inactive", !on));
}

/* ── Start ───────────────────────────────────────────────────── */
function startGame() {
  if (!allItems.length) return;
  gameItems    = shuffle(allItems).slice(0, 10);
  currentIdx   = 0;
  score        = 0;
  totalParts   = 0;
  correctParts = 0;
  catStats     = newStats();
  showScreen("game");
  loadItem();
}

/* ── Load one item ───────────────────────────────────────────── */
function loadItem() {
  const item = gameItems[currentIdx];
  selectedCompId = null;
  sortedMap      = {};
  splitting      = false;

  /* progress */
  const pct = Math.round((currentIdx / 10) * 100) + 10;
  $("progressFill").style.width  = pct + "%";
  $("progressLabel").textContent = (currentIdx + 1) + " / 10";
  $("scoreNum").textContent      = score;

  /* ── FIX: fully reset the card every time ──
     Must remove "hidden" (added at end of triggerSplit),
     "dissolving" (collapse animation class), "tappable",
     and clear the inline height that was locked before collapse. */
  const card = $("itemCard");
  card.classList.remove("hidden", "dissolving", "tappable");
  card.style.height  = "";
  card.style.opacity = "";
  card.style.padding = "";
  card.onclick       = null;

  /* fill card */
  $("itemMonogram").textContent = item.name.charAt(0).toUpperCase();
  $("itemName").textContent     = item.name;
  $("itemDesc").textContent     = item.description;

  /* tap hint */
  const hint = $("tapHint");
  if (item.needs_disassembly) {
    hint.classList.remove("hidden");
    card.classList.add("tappable");
    card.onclick = triggerSplit;
  } else {
    hint.classList.add("hidden");
  }

  /* reset everything else */
  $("componentsZone").classList.add("hidden");
  $("componentsList").innerHTML = "";
  $("feedbackBanner").className = "feedback-banner";
  $("nextBtn").classList.remove("show");
  $("binsHint").textContent = "Select a piece above, then tap a bin";

  setBinsActive(false);
  $("gameBody").scrollTop = 0;

  if (!item.needs_disassembly) {
    showComponents(item);
    setBinsActive(true);
  }
}

/* ── Scatter / split animation ───────────────────────────────── */
function triggerSplit() {
  if (splitting) return;
  splitting = true;

  const item   = gameItems[currentIdx];
  const card   = $("itemCard");
  const nameEl = $("itemName");
  const n      = item.components.length;

  /* measure origin — centre of the item name text */
  const r  = nameEl.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;

  /* spawn one fragment per component, fan-spread above the card */
  const arcStart = -150;
  const arcEnd   = -30;

  for (let i = 0; i < n; i++) {
    const fraction = n === 1 ? 0.5 : i / (n - 1);
    const deg = arcStart + fraction * (arcEnd - arcStart);
    const rad = deg * (Math.PI / 180);
    const dist = 90 + i * 18;

    const frag = document.createElement("span");
    frag.className        = "scatter-frag";
    frag.textContent      = item.name;
    frag.style.left       = cx + "px";
    frag.style.top        = cy + "px";
    frag.style.fontSize   = Math.max(13, 20 - n * 1.5) + "px";
    document.body.appendChild(frag);

    /* force a paint at the start position, then animate away */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const tx = Math.cos(rad) * dist;
        const ty = Math.sin(rad) * dist;
        frag.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.28) rotate(${(i - (n-1)/2) * 12}deg)`;
        frag.style.opacity   = "0";
        frag.style.filter    = "blur(3px)";
      });
    });

    setTimeout(() => frag.remove(), 700);
  }

  /* lock current height so the CSS transition has a start value, then collapse */
  card.style.height = card.offsetHeight + "px";
  card.onclick      = null;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.classList.add("dissolving");
    });
  });

  /* after card collapses, hide it completely and show chips */
  setTimeout(() => {
    card.classList.add("hidden");
    showComponents(item);
    setBinsActive(true);
    setTimeout(() => {
      $("componentsZone").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 80);
  }, 360);
}

/* ── Render component chips ──────────────────────────────────── */
function showComponents(item) {
  $("zoneLabel").textContent = item.components.length > 1 ? "Sort each piece" : "Sort this item";

  $("componentsList").innerHTML = item.components.map((c, i) => `
    <div class="component-chip"
         id="chip-${c.id}"
         style="--i:${i}"
         onclick="selectComponent(${c.id})">
      <div class="chip-bar"></div>
      <div class="chip-text">
        <div class="chip-name">${c.name}</div>
      </div>
      <div class="chip-badge" id="badge-${c.id}"></div>
    </div>
  `).join("");

  $("componentsZone").classList.remove("hidden");
}

/* ── Select a chip ───────────────────────────────────────────── */
function selectComponent(id) {
  const item = gameItems[currentIdx];
  if (sortedMap[id] !== undefined) return;

  if (selectedCompId !== null && selectedCompId !== id) {
    $("chip-" + selectedCompId)?.classList.remove("selected");
  }
  selectedCompId = id;
  $("chip-" + id).classList.add("selected");

  const comp = item.components.find(c => c.id === id);
  $("binsHint").textContent = `Now tap the bin for \u201c${comp.name}\u201d`;
}

/* ── Sort selected chip ──────────────────────────────────────── */
function sortSelected(binChoice) {
  if (selectedCompId === null) {
    document.querySelectorAll(".bin-btn").forEach(b => {
      b.classList.add("pulse");
      setTimeout(() => b.classList.remove("pulse"), 280);
    });
    $("binsHint").textContent = "Select a piece above first!";
    return;
  }

  const item = gameItems[currentIdx];
  const comp = item.components.find(c => c.id === selectedCompId);
  if (!comp) return;

  const correct = binChoice === comp.bin;
  sortedMap[selectedCompId] = binChoice;

  const chip = $("chip-" + selectedCompId);
  chip.classList.remove("selected");
  chip.classList.add("sorted-" + binChoice);
  chip.onclick = null;

  const labels = { recycle:"Recycle", trash:"Trash", compost:"Compost" };
  $("badge-" + selectedCompId).textContent = labels[binChoice];

  totalParts++;
  catStats[comp.bin].t++;
  if (correct) {
    correctParts++;
    catStats[comp.bin].c++;
    score++;
  } else {
    chip.classList.add("wrong-flash");
    setTimeout(() => chip.classList.remove("wrong-flash"), 520);
  }

  $("scoreNum").textContent = score;
  selectedCompId            = null;
  $("binsHint").textContent = "Select a piece above, then tap a bin";

  const binEl = document.querySelector(".bin-btn." + binChoice);
  if (binEl) {
    binEl.classList.add("pulse");
    setTimeout(() => binEl.classList.remove("pulse"), 280);
  }

  if (item.components.every(c => sortedMap[c.id] !== undefined)) {
    setBinsActive(false);
    showItemFeedback(item);
  }
}

/* ── Item feedback ───────────────────────────────────────────── */
function showItemFeedback(item) {
  const wrong  = item.components.filter(c => sortedMap[c.id] !== c.bin);
  const banner = $("feedbackBanner");
  const labels = { recycle:"Recycling", trash:"Trash", compost:"Compost" };

  if (wrong.length === 0) {
    banner.className = "feedback-banner correct show";
    banner.innerHTML = "<strong>All correct!</strong> Every piece went to the right bin.";
  } else {
    const fixes = wrong.map(c =>
      `<strong>${c.name}</strong> &rarr; ${labels[c.bin]}`
    ).join(" &middot; ");
    banner.className = "feedback-banner wrong show";
    banner.innerHTML = `<strong>Almost!</strong> ${fixes}`;
  }

  const nb = $("nextBtn");
  nb.textContent = currentIdx >= 9 ? "See My Results" : "Next Item";
  nb.classList.add("show");

  setTimeout(() => banner.scrollIntoView({ behavior:"smooth", block:"nearest" }), 100);
}

/* ── Next item ───────────────────────────────────────────────── */
function nextItem() {
  currentIdx++;
  if (currentIdx >= 10) { showResults(); return; }
  loadItem();
  $("gameBody").scrollTop = 0;
}

/* ── Results ─────────────────────────────────────────────────── */
function showResults() {
  $("progressFill").style.width = "100%";

  const pct   = Math.round((correctParts / Math.max(totalParts, 1)) * 100);
  const tiers = [
    { min:100, grade:"Perfect",    title:"Flawless Sorter!"           },
    { min: 80, grade:"Excellent",  title:"Great Job!"                 },
    { min: 60, grade:"Good",       title:"Getting There!"             },
    { min: 40, grade:"Fair",       title:"Keep Practicing!"           },
    { min:  0, grade:"Keep At It", title:"Everyone Starts Somewhere." },
  ];
  const tier = tiers.find(t => pct >= t.min);

  $("resultsGrade").textContent = tier.grade;
  $("resultsTitle").textContent = tier.title;
  $("resultsScore").textContent = correctParts;
  $("resultsOf").textContent    = `out of ${totalParts} pieces sorted correctly`;

  const fmt = k => catStats[k].t > 0 ? `${catStats[k].c} / ${catStats[k].t}` : "—";
  $("brRecycle").textContent = fmt("recycle");
  $("brTrash").textContent   = fmt("trash");
  $("brCompost").textContent = fmt("compost");

  showScreen("results");
}
</script>
</body>
</html>
